<!DOCTYPE html>
<html>
<head>
  <title>Send Location to Server</title>
</head>
<body>
  <h1>Location Capture</h1>
  <button onclick="sendLocation()">Send My Location</button>

  <script>
    function sendLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const data = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
          };

          // Send to server via POST
          fetch("https://locatbackend.onrender.com/location", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
          })
          .then(res => console.log("Location sent:", res.status))
          .catch(err => console.error("Error:", err));
        });
      } else {
        console.log("Geolocation not supported");
      }
    }
  </script>
</body>
</html>
